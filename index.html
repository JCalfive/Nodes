<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John's Node Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080c14;
  --card: #0d1320;
  --card2: #111827;
  --border: #1e2d45;
  --accent: #00e5a0;
  --accent2: #0099ff;
  --accent3: #ff6b35;
  --text: #e2eaf5;
  --dim: #6b7fa3;
  --muted: #3a4a66;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,229,160,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 90% 100%, rgba(0,153,255,0.07) 0%, transparent 60%);
}

/* ── HEADER ─────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.4rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,20,0.9);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.logo { display: flex; align-items: center; gap: .8rem; }
.logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.logo-text { font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; }
.logo-text span { color: var(--accent); }
.header-stats { display: flex; gap: 2rem; }
.hstat { text-align: right; }
.hstat-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--accent); }
.hstat-label { font-size: .7rem; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }

/* ── MAIN ─────────────────────────────────── */
.main { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* ── TABS ─────────────────────────────────── */
.tabs { display: flex; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.tab {
  padding: .5rem 1.2rem; border-radius: 6px; font-size: .8rem;
  font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--dim); transition: all .2s;
}
.tab.active, .tab:hover { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── SECTION HEADER ─────────────────────────────────── */
.section-header {
  display: flex; align-items: center; gap: 1rem;
  margin: 2rem 0 1rem;
}
.section-title { font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-count {
  font-family: 'DM Mono', monospace; font-size: .7rem;
  color: var(--accent); background: rgba(0,229,160,.1);
  padding: .2rem .6rem; border-radius: 20px; border: 1px solid rgba(0,229,160,.2);
}

/* ── NODE GRID ─────────────────────────────────── */
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1rem;
}

/* ── NODE CARD ─────────────────────────────────── */
.node-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.1rem 1.2rem;
  transition: border-color .2s, transform .15s;
  position: relative;
  overflow: hidden;
}
.node-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--card-accent, var(--accent));
  opacity: .6;
}
.node-card:hover { border-color: var(--muted); transform: translateY(-2px); }
.node-card.running { --card-accent: var(--accent); }
.node-card.pending { --card-accent: var(--amber); }
.node-card.new { --card-accent: var(--accent2); }

.node-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .8rem; }
.node-name { font-size: 1rem; font-weight: 700; line-height: 1.2; }
.node-type { font-size: .68rem; color: var(--dim); margin-top: .15rem; }
.node-badge {
  font-size: .62rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: .2rem .55rem;
  border-radius: 4px; white-space: nowrap;
}
.badge-running { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.badge-pending { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
.badge-new { background: rgba(0,153,255,.15); color: var(--accent2); border: 1px solid rgba(0,153,255,.2); }
.badge-install { background: rgba(168,85,247,.15); color: var(--purple); border: 1px solid rgba(168,85,247,.25); }

.node-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .7rem; }
.node-pill {
  font-family: 'DM Mono', monospace; font-size: .68rem;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--dim); padding: .2rem .55rem; border-radius: 20px;
}
.node-pill.token { color: var(--accent); border-color: rgba(0,229,160,.2); }

.node-earnings {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: .7rem; border-top: 1px solid var(--border);
}
.node-est { font-size: .68rem; color: var(--dim); }
.node-est span { color: var(--text); font-family: 'DM Mono', monospace; font-weight: 500; }

.node-input-row { display: flex; gap: .5rem; margin-top: .6rem; align-items: center; }
.node-input {
  flex: 1; background: var(--card2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: .8rem;
  padding: .3rem .6rem; border-radius: 6px; outline: none;
  transition: border-color .2s;
}
.node-input:focus { border-color: var(--accent); }
.node-input::placeholder { color: var(--muted); }
.save-btn {
  background: var(--accent); color: #000; border: none; font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: .7rem; padding: .3rem .7rem;
  border-radius: 5px; cursor: pointer; transition: opacity .2s;
  white-space: nowrap;
}
.save-btn:hover { opacity: .85; }

/* ── DASHBOARD TOP STATS ─────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.1rem 1.2rem;
}
.stat-label { font-size: .68rem; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500; color: var(--accent); }
.stat-sub { font-size: .7rem; color: var(--dim); margin-top: .2rem; }

/* ── INSTALL GUIDE ─────────────────────────────────── */
.install-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem;
}
.install-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .8rem; }
.install-name { font-size: 1rem; font-weight: 700; }
.install-steps { list-style: none; }
.install-steps li {
  display: flex; gap: .8rem; padding: .4rem 0;
  border-bottom: 1px solid var(--border); font-size: .82rem; color: var(--dim);
  align-items: flex-start;
}
.install-steps li:last-child { border-bottom: none; }
.step-num {
  font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--accent);
  background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.2);
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.install-url {
  font-family: 'DM Mono', monospace; font-size: .72rem;
  color: var(--accent2); background: rgba(0,153,255,.08);
  padding: .1rem .4rem; border-radius: 4px; border: 1px solid rgba(0,153,255,.2);
  word-break: break-all;
}

/* ── RESPONSIVE ─────────────────────────────────── */
@media(max-width:640px){
  .header { padding: 1rem; flex-wrap: wrap; gap: .8rem; }
  .header-stats { gap: 1rem; }
  .main { padding: 1rem .8rem 3rem; }
  .hstat-val { font-size: .9rem; }
}
</style>
</head>

function buildAll(){

function buildStats(){
  const total = NODES.length;
  const running = NODES.filter(n=>n.status==='running').length;
  const newNodes = NODES.filter(n=>n.status==='new').length;
  const totalPaid = payouts.reduce((a,p)=>a+parseFloat(p.amount||0),0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Nodes</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">${running} running · ${newNodes} to add</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. Monthly Min</div>
      <div class="stat-val" style="color:var(--accent)">£${calcMin()}</div>
      <div class="stat-sub">Conservative estimate</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. Monthly Max</div>
      <div class="stat-val" style="color:var(--accent2)">£${calcMax()}</div>
      <div class="stat-sub">Optimistic estimate</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Logged</div>
      <div class="stat-val" style="color:var(--accent3)">£${totalPaid.toFixed(2)}</div>
      <div class="stat-sub">${payouts.length} payouts recorded</div>
    </div>
  `;
}

function calcMin(){
  return NODES.reduce((acc,n)=>{ const m=n.earn.match(/£(\d+)/); return acc+(m?parseInt(m[1]):0); },0);
}
function calcMax(){
  return NODES.reduce((acc,n)=>{ const m=n.earn.match(/£(\d+)–£(\d+)/); return acc+(m?parseInt(m[2]):0); },0);
}

function buildSections(){
  const cats = [
    { label:'PC Nodes — Running',  filter: n=>n.cat==='PC Node' && n.status==='running', color:'var(--accent)' },
    { label:'PC Bandwidth — Running', filter: n=>n.cat==='PC Bandwidth' && n.status==='running', color:'var(--accent)' },
    { label:'Phone Apps — Running', filter: n=>n.cat==='Phone App' && n.status==='running', color:'var(--accent)' },
    { label:'New PC Nodes — Install These', filter: n=>n.status==='new' && n.cat==='PC Node', color:'var(--accent2)' },
    { label:'New Chrome Extensions — Install These', filter: n=>n.status==='new' && n.cat==='PC Extension', color:'var(--purple)' },
  ];

  let html = '';
  cats.forEach(c=>{
    const nodes = NODES.filter(c.filter);
    if(!nodes.length) return;
    html += `
      <div class="section-header">
        <div class="section-title" style="color:${c.color}">${c.label}</div>
        <div class="section-line"></div>
        <div class="section-count">${nodes.length}</div>
      </div>
      <div class="node-grid">${nodes.map(nodeCard).join('')}</div>
    `;
  });
  document.getElementById('sections-container').innerHTML = html;
}

function nodeCard(n){
  const bal = earnings[n.id] || '';
  const note = notes[n.id] || '';
  const isNew = n.status==='new';
  const badgeClass = n.status==='running' ? 'badge-running' : n.status==='new' ? 'badge-new' : 'badge-pending';
  const badgeText  = n.status==='running' ? '✅ Running' : '🆕 Add This';

  return `
    <div class="node-card ${n.status}" style="${isNew?'opacity:.92':''}">
      <div class="node-top">
        <div>
          <div class="node-name">${n.name}</div>
          <div class="node-type">${n.cat} · ${n.uses}</div>
        </div>
        <div class="node-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="node-row">
        <span class="node-pill token">${n.token}</span>
        <span class="node-pill">${n.wallet}</span>
      </div>
      <div style="font-size:.73rem;color:var(--dim);margin-bottom:.7rem;line-height:1.4">${n.desc}</div>
      <div class="node-earnings">
        <div class="node-est">Est: <span>${n.earn}/mo</span></div>
        ${isNew
          ? `<a href="${n.url}" target="_blank" style="font-size:.7rem;color:var(--accent2);text-decoration:none;font-weight:700;">🔗 Install →</a>`
          : `<a href="${n.url}" target="_blank" style="font-size:.7rem;color:var(--accent);text-decoration:none;font-weight:700;">Dashboard →</a>`
        }
      </div>
      ${!isNew ? `
      <div class="node-input-row">
        <input class="node-input" id="bal-${n.id}" type="number" step="0.01"
          placeholder="Balance £" value="${bal}"
          onchange="earnings['${n.id}']=this.value;save();updateHeader()">
        <input class="node-input" id="note-${n.id}" type="text"
          placeholder="Note" value="${note}"
          onchange="notes['${n.id}']=this.value;save()" style="flex:2">
      </div>
      ` : ''}
    </div>
  `;
}

function buildInstallGuide(){
  const newNodes = NODES.filter(n=>n.status==='new');
  document.getElementById('install-list').innerHTML = newNodes.map(n=>`
    <div class="install-card">
      <div class="install-header">
        <div class="install-name">${n.name} <span style="color:var(--dim);font-size:.8rem;font-weight:400">· ${n.cat}</span></div>
        <div style="display:flex;gap:.8rem;align-items:center">
          <span style="font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent)">${n.earn}/mo</span>
          <a href="${n.url}" target="_blank" style="background:var(--accent2);color:#fff;text-decoration:none;font-size:.7rem;font-weight:700;padding:.3rem .7rem;border-radius:5px;">Open Site →</a>
        </div>
      </div>
      <div style="font-size:.78rem;color:var(--dim);margin-bottom:.8rem;">${n.desc}</div>
      <ul class="install-steps">
        ${(n.steps||['Visit the website and create a free account','Download and install the software','Connect your wallet','Start the node or extension','Monitor earnings in the dashboard']).map((s,i)=>`
          <li>
            <span class="step-num">${i+1}</span>
            <span>${s}</span>
          </li>
        `).join('')}
      </ul>
      <div style="margin-top:.6rem;"><span class="install-url">${n.url}</span></div>
    </div>
  `).join('');
}

function buildEarningsLog(){
  const sorted = [...payouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('earnings-list').innerHTML = sorted.length ? sorted.map(p=>`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.2rem;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:700;font-size:.9rem">${p.node}</div>
        <div style="font-size:.72rem;color:var(--dim)">${p.date}</div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--green)">+£${parseFloat(p.amount).toFixed(2)}</div>
    </div>
  `).join('') : `<div style="text-align:center;color:var(--dim);padding:3rem;font-size:.85rem;">No payouts logged yet. Use the form above to record when you cash out.</div>`;
}

function populateLogSelect(){
  const sel = document.getElementById('log-node');
  sel.innerHTML = NODES.map(n=>`<option value="${n.name}">${n.name}</option>`).join('');
}

function logPayout(){
  const node = document.getElementById('log-node').value;
  const amount = document.getElementById('log-amount').value;
  const date = document.getElementById('log-date').value || new Date().toISOString().slice(0,10);
  if(!amount) return;
  payouts.push({ node, amount, date });
  savePay();
  document.getElementById('log-amount').value='';
  buildEarningsLog();
  buildStats();
  updateHeader();
}

function updateHeader(){
  const total = Object.values(earnings).reduce((a,v)=>a+parseFloat(v||0),0);
  document.getElementById('hdr-nodes').textContent = NODES.length;
  document.getElementById('hdr-monthly').textContent = `£${total.toFixed(2)}`;
}

function showTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['all','install','earnings'].forEach(t=>{
    const el = document.getElementById(`tab-${t}`);
    if(el) el.style.display = t===name ? '' : 'none';
  });
  if(name==='running'){
    // filter view
    document.getElementById('tab-all').style.display='';
    filterView('running');
  } else if(name==='new'){
    document.getElementById('tab-all').style.display='';
    filterView('new');
  } else if(name==='all'){
    document.getElementById('tab-all').style.display='';
    filterView('all');
  }
}

function filterView(filter){
  // simple approach: rebuild sections with filter
  if(filter==='all'){ buildSections(); return; }
  const nodes = NODES.filter(n=>n.status===filter);
  const grid = `<div class="node-grid">${nodes.map(nodeCard).join('')}</div>`;
  document.getElementById('sections-container').innerHTML = `
    <div class="section-header">
      <div class="section-title">${filter==='running'?'Currently Running':'Ready to Install'}</div>
      <div class="section-line"></div>
      <div class="section-count">${nodes.length}</div>
    </div>${grid}`;
}

// Set today's date on load
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('log-date').value = new Date().toISOString().slice(0,10);
  buildAll();
});
</script>
</body>
</html>
